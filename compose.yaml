services:
  postgres:
    image: postgres:17
    container_name: uber-postgres

    environment:
      POSTGRES_DB: uber_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: uber-pgadmin

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@uber.com
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "5050:80"

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    depends_on:
      - postgres

volumes:
  postgres_data:
  pgadmin_data:

